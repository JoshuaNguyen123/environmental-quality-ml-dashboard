name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile critical modules
        run: python -m py_compile app/app.py scripts/train_all.py scripts/build_report.py src/utils/io.py

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests
        run: pytest -q -m "not slow"

  smoke:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    # Only on PRs and pushes to main — keeps developer push CI fast.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline smoke test
        run: pytest -q -m slow
